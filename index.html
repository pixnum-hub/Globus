<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Globus</title>
<meta name="theme-color" content="#0b0e14">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Globus">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--r:16px;--bw:1px}
  [data-theme="dark"]{--bg:#0b0e14;--surface:#121826;--surface2:#1a2233;--text:#e9edf4;--muted:#8d97ab;--accent:#f5b942;--border:#232c3d;--day:#f5b942;--night:#5b7fff;--shadow:0 8px 24px rgba(0,0,0,.35)}
  [data-theme="light"]{--bg:#f5f3ee;--surface:#ffffff;--surface2:#efebe1;--text:#201d17;--muted:#6d6656;--accent:#b9790f;--border:#e2ddd0;--day:#e0a300;--night:#3955c4;--shadow:0 8px 20px rgba(60,50,20,.08)}
  [data-theme="oled"]{--bg:#000000;--surface:#0a0a0a;--surface2:#141414;--text:#f2f2f2;--muted:#8a8a8a;--accent:#ffcc4d;--border:#1e1e1e;--day:#ffcc4d;--night:#6f8dff;--shadow:none}
  [data-theme="hc"]{--bg:#000000;--surface:#000000;--surface2:#000000;--text:#ffffff;--muted:#ffffff;--accent:#ffff00;--border:#ffffff;--day:#ffff00;--night:#00e5ff;--shadow:none;--bw:2px}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;transition:background .25s,color .25s;-webkit-tap-highlight-color:transparent}
  .app{flex:1;display:flex;flex-direction:column;max-width:1100px;margin:0 auto;width:100%;padding:1.1rem 1rem 0}
  header{display:flex;align-items:center;justify-content:space-between;gap:.75rem;flex-wrap:wrap;margin-bottom:1rem;padding-right:12.5rem}
  @media(max-width:420px){
    header{padding-right:10.5rem}
    .theme-toggle{gap:.2rem;padding:.25rem}
    .theme-toggle button{width:1.8rem;height:1.8rem;font-size:.85rem}
  }
  .brand{display:flex;flex-direction:column;line-height:1.15}
  .brand small{color:var(--muted);font-size:.72rem;letter-spacing:.08em;text-transform:uppercase}
  h1{font-family:'Inter',sans-serif;font-size:2rem;font-weight:700;margin:0;letter-spacing:-.02em}
  @media(min-width:560px){h1{font-size:2.5rem}}
  .theme-toggle{position:fixed;top:calc(.75rem + env(safe-area-inset-top,0px));right:calc(.75rem + env(safe-area-inset-right,0px));z-index:50;display:flex;gap:.35rem;background:var(--surface);border:var(--bw) solid var(--border);border-radius:999px;padding:.3rem;box-shadow:var(--shadow)}
  .theme-toggle button{border:none;background:transparent;color:var(--muted);width:2.1rem;height:2.1rem;border-radius:999px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:background .2s,color .2s}
  .theme-toggle button[aria-pressed="true"]{background:var(--accent);color:#111}
  .theme-toggle button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .toolbar{display:flex;align-items:center;justify-content:space-between;gap:.6rem;flex-wrap:wrap;margin-bottom:.8rem}
  .toggle-group{display:flex;gap:.35rem;background:var(--surface);border:var(--bw) solid var(--border);border-radius:999px;padding:.3rem}
  .toggle-group button{border:none;background:transparent;color:var(--muted);font-family:'Inter',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.03em;padding:.4rem .7rem;border-radius:999px;cursor:pointer;transition:background .2s,color .2s}
  .toggle-group button[aria-pressed="true"]{background:var(--accent);color:#111}
  .edit-toggle{display:flex;align-items:center;gap:.5rem;background:var(--surface);border:var(--bw) solid var(--border);border-radius:999px;padding:.3rem .3rem .3rem .9rem;font-size:.78rem;color:var(--muted);cursor:pointer;user-select:none}
  .edit-toggle .switch{position:relative;width:2.3rem;height:1.3rem;background:var(--surface2);border:var(--bw) solid var(--border);border-radius:999px;flex-shrink:0}
  .edit-toggle .switch::after{content:"";position:absolute;top:50%;left:.15rem;width:.9rem;height:.9rem;border-radius:50%;background:var(--muted);transform:translateY(-50%);transition:left .18s,background .18s}
  .edit-toggle[aria-pressed="true"] .switch{background:var(--accent)}
  .edit-toggle[aria-pressed="true"] .switch::after{left:1.15rem;background:#111}
  .edit-toggle[aria-pressed="true"]{color:var(--text)}
  #pauseIcon{font-size:1rem;line-height:1}
  #pauseToggle[aria-pressed="true"] #pauseIcon{color:var(--accent)}
  .toolbar-row{display:flex;gap:.5rem;flex-wrap:wrap}
  .home-bar{display:flex;align-items:center;gap:.6rem;background:var(--surface);border:var(--bw) solid var(--border);border-radius:12px;padding:.5rem .7rem;margin-bottom:.8rem;font-size:.82rem;color:var(--muted)}
  .home-bar select{flex:1;padding:.4rem .5rem;font-size:.82rem}
  select,.autocomplete input{font-family:'Inter',sans-serif;font-size:.9rem;background:var(--surface);color:var(--text);border:var(--bw) solid var(--border);border-radius:10px;padding:.6rem .7rem;width:100%}
  .add-city{display:none;margin-bottom:1.1rem}
  .app.editing .add-city{display:block}
  .autocomplete{position:relative}
  .ac-list{position:absolute;top:110%;left:0;right:0;background:var(--surface);border:var(--bw) solid var(--border);border-radius:10px;max-height:240px;overflow:auto;z-index:20;display:none;box-shadow:var(--shadow)}
  .ac-list.show{display:block}
  .ac-item{padding:.55rem .7rem;cursor:pointer;font-size:.85rem;display:flex;gap:.45rem;align-items:center}
  .ac-item:hover{background:var(--surface2)}
  .ac-item .muted{color:var(--muted);font-size:.72rem;margin-left:auto}
  .compare-panel{display:none;flex-direction:column;gap:.6rem;background:var(--surface);border:var(--bw) solid var(--border);border-radius:var(--r);padding:1rem;margin-bottom:1.1rem}
  .app.comparing .compare-panel{display:flex}
  .compare-row{display:flex;align-items:center;gap:.6rem}
  .compare-row select{flex:1}
  .compare-row .vs{color:var(--muted);font-family:'Inter',sans-serif;font-size:.72rem;flex:0 0 auto}
  .compare-result{font-family:'Inter',sans-serif;font-size:.92rem;text-align:center;padding-top:.5rem;border-top:var(--bw) solid var(--border)}
  .compare-result strong{color:var(--accent)}
  .grid{display:grid;grid-template-columns:1fr;gap:.85rem;padding-bottom:2rem}
  @media(min-width:560px){.grid{grid-template-columns:1fr 1fr}}
  @media(min-width:900px){.grid{grid-template-columns:1fr 1fr 1fr}}
  .card{background:color-mix(in srgb, var(--band,var(--surface)) 9%, var(--surface));border:var(--bw) solid var(--border);border-radius:var(--r);padding:1rem 1.1rem 1.1rem;box-shadow:var(--shadow);position:relative;transition:background .4s}
  [data-theme="hc"] .card{background:var(--surface) !important}
  .card[draggable="true"]{cursor:grab}
  .card.dragging{opacity:.4}
  .card .remove{display:none;position:absolute;top:.6rem;right:.6rem;background:transparent;border:none;color:var(--muted);font-size:1rem;cursor:pointer;line-height:1;padding:.2rem .4rem;border-radius:6px}
  .app.editing .card .remove{display:block}
  .card .remove:hover{color:var(--text);background:var(--surface2)}
  .analog-toggle{position:absolute;top:.6rem;right:2.1rem;background:transparent;border:none;color:var(--muted);font-size:.95rem;cursor:pointer;line-height:1;padding:.2rem .3rem;border-radius:6px}
  .analog-toggle:hover{color:var(--text);background:var(--surface2)}
  .ambient-toggle{position:absolute;top:.6rem;right:3.6rem;background:transparent;border:none;color:var(--muted);font-size:.95rem;cursor:pointer;line-height:1;padding:.2rem .3rem;border-radius:6px}
  .ambient-toggle:hover{color:var(--text);background:var(--surface2)}
  .ambient-toggle[aria-pressed="true"]{color:var(--accent)}
  .place{display:flex;align-items:baseline;gap:.45rem;margin-bottom:.15rem;padding-right:4.1rem}
  .place .flag{font-size:1.15rem}
  .place .city{font-weight:700;font-size:1.02rem}
  .place .country{color:var(--muted);font-size:.78rem}
  .time{font-family:'Inter',sans-serif;font-size:2.1rem;font-weight:700;font-variant-numeric:tabular-nums;margin:.15rem 0 .1rem;letter-spacing:.01em}
  .time{display:inline-flex;align-items:center;gap:.12em}
  .time .d2{display:inline-block;width:1.15em;overflow:visible;text-align:center;line-height:1}
  .time .ms{display:inline-block;width:2.6em;overflow:visible;text-align:left;font-size:.5em;font-weight:600;color:var(--muted);letter-spacing:0;line-height:1}
  .time .ampm{display:inline-block;font-size:.42em;font-weight:700;color:var(--accent);letter-spacing:.03em;margin-left:.1em;line-height:1}
  .app.wide-digits .time .d2{width:1.7em}
  .app.wide-digits .time .ms{width:3.6em}
  .analog-face{display:none;position:relative;width:104px;height:104px;border-radius:50%;border:3px solid var(--border);margin:.4rem auto .2rem;background:var(--surface2)}
  .card.analog .analog-face{display:block}
  .card.analog .time{display:none}
  .analog-face::after{content:"";position:absolute;top:6px;left:50%;width:4px;height:7px;background:var(--muted);transform:translateX(-50%);z-index:1}
  .analog-face .hand{position:absolute;top:50%;left:50%;transform-origin:50% 100%;background:var(--text);border-radius:3px;z-index:2}
  .analog-face .hour{width:5px;height:28px;margin:-28px 0 0 -2.5px}
  .analog-face .minute{width:4px;height:39px;margin:-39px 0 0 -2px}
  .analog-face .second{width:2px;height:43px;margin:-43px 0 0 -1px;background:var(--accent);z-index:3}
  .analog-face .center{position:absolute;left:50%;top:50%;width:9px;height:9px;background:var(--accent);border-radius:50%;transform:translate(-50%,-50%);z-index:4;box-shadow:0 0 0 2px var(--surface2)}
  .sub{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:.78rem;margin-bottom:.5rem}
  .badge{font-family:'Inter',sans-serif;background:var(--surface2);padding:.15rem .45rem;border-radius:6px;font-size:.72rem}
  .distance{font-size:.72rem;color:var(--muted);margin-bottom:.55rem}
  .holiday{font-size:.74rem;font-weight:600;color:var(--accent);background:color-mix(in srgb, var(--accent) 15%, var(--surface));border-radius:6px;padding:.25rem .5rem;margin-bottom:.4rem}
  .tide{font-size:.72rem;color:var(--muted);margin-bottom:.4rem}
  .daybar{height:5px;border-radius:3px;background:linear-gradient(90deg,var(--night),var(--day) 50%,var(--night));position:relative;margin-top:.4rem}
  .daybar .dot{position:absolute;top:50%;width:9px;height:9px;border-radius:50%;background:var(--text);border:2px solid var(--surface);transform:translate(-50%,-50%)}
  .daynight{font-size:.72rem;color:var(--muted);margin-top:.4rem;display:flex;align-items:center;gap:.3rem}
  footer{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:.4rem;padding:1.1rem 1rem;border-top:var(--bw) solid var(--border);color:var(--muted);font-size:.78rem}
  footer p{margin:0;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:.35rem;min-height:1.4rem}
  footer button{background:none;border:none;color:inherit;text-decoration:underline;cursor:pointer;font:inherit;padding:0}
  @media(prefers-reduced-motion:no-preference){.card{transition:transform .15s,background .4s}.card:hover{transform:translateY(-2px)}}
  .app.low-power .card{transition:none !important}
  .app.low-power .card:hover{transform:none}
</style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand"><small id="liveLabel">Live &middot; synced</small><h1 id="appTitle">Globus</h1></div>
      <div class="theme-toggle" role="group" aria-label="Theme">

        <button data-theme-btn="light" aria-pressed="false" title="Light">&#9728;</button>
        <button data-theme-btn="oled" aria-pressed="false" title="OLED True Black">&#9679;</button>
        <button data-theme-btn="hc" aria-pressed="false" title="High Contrast">&#9673;</button>
      </div>
    </header>

    <div class="toolbar">
      <div class="toggle-group" role="group" aria-label="Time format">
        <button data-format-btn="24" aria-pressed="false">24H</button>
        <button data-format-btn="12" aria-pressed="true">12H</button>
      </div>
      <button class="edit-toggle" id="pauseToggle" aria-pressed="false">
        <span id="pauseIcon" aria-hidden="true">&#9208;</span>
        <span id="pauseLabel">Pause</span>
      </button>
      <div class="toolbar-row">
        <button class="edit-toggle" id="compareToggle" aria-pressed="false">
          <span class="switch" aria-hidden="true"></span>
          <span id="compareLabel">Compare cities</span>
        </button>
        <button class="edit-toggle" id="editToggle" aria-pressed="false">
          <span class="switch" aria-hidden="true"></span>
          <span id="editLabel">Add / remove / reorder</span>
        </button>
      </div>
    </div>

    <div class="toolbar">
      <select id="langSelect" aria-label="Language" style="width:auto;flex:0 0 auto;padding:.4rem .5rem;font-size:.78rem;max-width:8rem">
        <optgroup label="World">
          <option value="en">English</option>
          <option value="es">Espa&#241;ol</option>
          <option value="fr">Fran&#231;ais</option>
          <option value="de">Deutsch</option>
          <option value="pt">Portugu&#234;s</option>

          <option value="ko">&#54620;&#44397;&#50612;</option>
          <option value="it">Italiano</option>
        </optgroup>
        <optgroup label="Indian">
          <option value="hi">&#2361;&#2367;&#2344;&#2381;&#2342;&#2368;</option>
          <option value="bn">&#2476;&#2494;&#2434;&#2482;&#2494;</option>
          <option value="ta">&#2980;&#2990;&#3007;&#2996;&#3021;</option>
          <option value="te">&#3108;&#3142;&#3122;&#3137;&#3095;&#3137;</option>
          <option value="mr">&#2350;&#2352;&#2366;&#2336;&#2368;</option>
          <option value="gu">&#2711;&#2753;&#2716;&#2736;&#2750;&#2724;&#2752;</option>
          <option value="kn">&#3221;&#3240;&#3277;&#3240;&#3233;</option>
          <option value="ml">&#3374;&#3378;&#3375;&#3390;&#3379;&#3330;</option>
          <option value="pa">&#2602;&#2672;&#2588;&#2622;&#2604;&#2624;</option>
          <option value="ur">&#1575;&#1585;&#1583;&#1608;</option>
          <option value="or">&#2835;&#2849;&#2876;&#2879;&#2822;</option>
        </optgroup>
      </select>
      <div class="edit-toggle" style="cursor:default;padding:6px 10px">
        <span aria-hidden="true">Aa</span>
        <input type="range" id="fontSize" min="15" max="130" step="5" value="100" aria-label="Text size" style="width:80px">
        <span id="fontSizeReadout" style="min-width:2.4em;font-variant-numeric:tabular-nums">100%</span>
      </div>
      <button class="edit-toggle" id="lowPowerToggle" aria-pressed="false">
        <span class="switch" aria-hidden="true"></span>
        <span id="lowPowerLabel">Low-power mode</span>
      </button>
    </div>

    <div class="home-bar">
      <span>&#128205; Home base</span>
      <select id="homeSelect" aria-label="Home city for distance calculations"></select>
    </div>

    <div class="home-bar" id="moonBar">&#127761; --</div>

    <div class="compare-panel" id="comparePanel">
      <div class="compare-row">
        <select id="cmpA" aria-label="First city"></select>
        <span class="vs">VS</span>
        <select id="cmpB" aria-label="Second city"></select>
      </div>
      <div class="compare-result" id="cmpResult">--</div>
      <div class="compare-result" id="cmpOverlap">--</div>
      <div class="compare-result" id="cmpJetlag">--</div>
    </div>

    <div class="add-city">
      <div class="autocomplete">
        <input type="text" id="citySearch" placeholder="Search & tap a city to add..." autocomplete="off">
        <div class="ac-list" id="acList"></div>
      </div>
    </div>

    <main class="grid" id="grid" aria-live="polite"></main>

    <footer>
      <p>
        <span>&copy; Manik Roy</span>
        <span><span id="year"></span>.</span>
        <span id="rightsLabel">All Rights Reserved.</span>
      </p>
      <p>
        <button id="exportBtn">Export my data</button>
        <span aria-hidden="true">&middot;</span>
        <button id="deleteBtn">Delete my data</button>
      </p>
    </footer>
  </div>

function offsetMinutes(zone, date){
  const parts = new Intl.DateTimeFormat('en-US', {timeZone:zone, timeZoneName:'longOffset'}).formatToParts(date);
  const raw = (parts.find(p => p.type === 'timeZoneName') || {}).value || 'GMT';
  const m = raw.match(/GMT([+-])(\d{2}):(\d{2})/);
  if(!m) return 0;
  return (m[1] === '-' ? -1 : 1) * (parseInt(m[2],10) * 60 + parseInt(m[3],10));
}

function haversineKm(lat1,lon1,lat2,lon2){
  const R = 6371, toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2-lat1), dLon = toRad(lon2-lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function flightEstimate(km){
  const hrs = km/850 + 0.75;
  const h = Math.floor(hrs), m = Math.round((hrs-h)*60);

}

  if(hour < 5 || hour >= 22) return {name:'Night', color:'#5b4b9e', day:false};

  if(hour < 17) return {name:'Afternoon', color:'#4f8fe0', day:true};
  return {name:'Evening', color:'#e0673f', day:true};
}

function workWindowUTC(zone, date){
  const parts = fmt(zone, {year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(date);
  const y = +parts.find(p=>p.type==='year').value, mo = +parts.find(p=>p.type==='month').value, d = +parts.find(p=>p.type==='day').value;
  const off = offsetMinutes(zone, date);
  const base = Date.UTC(y, mo-1, d, 0, 0, 0);
  return [base + (9*60 - off)*60000, base + (17*60 - off)*60000];
}
function overlapText(cityA, cityB, date){
  const [aS,aE] = workWindowUTC(cityA.zone, date);
  const [bS,bE] = workWindowUTC(cityB.zone, date);
  const s = Math.max(aS,bS), e = Math.min(aE,bE);
  if(e <= s) return 'No overlap in standard 9AM\u20135PM hours today';
  const tA = fmt(cityA.zone, {hour:'2-digit',minute:'2-digit',hour12:use12h});
  const tB = fmt(cityB.zone, {hour:'2-digit',minute:'2-digit',hour12:use12h});
  return `Overlap (9\u20135 hrs): ${tA.format(new Date(s))}\u2013${tA.format(new Date(e))} in ${cityName(cityA)} = ${tB.format(new Date(s))}\u2013${tB.format(new Date(e))} in ${cityName(cityB)}`;
}

// Rough rule-of-thumb jetlag guidance: ~1 recovery day per 1.5h of zone change,
// with opposite light/sleep-shift advice depending on travel direction.
function jetlagTips(origin, dest, date){
  const diff = (offsetMinutes(dest.zone,date) - offsetMinutes(origin.zone,date)) / 60;
  if(Math.abs(diff) < 1) return `${cityName(origin)} \u2192 ${cityName(dest)}: minimal jetlag expected (under 1h difference).`;
  const days = Math.max(1, Math.round(Math.abs(diff) / 1.5));
  const eastward = diff > 0;
  const advice = eastward
    ? 'shift bedtime earlier and seek bright morning light at your destination'
    : 'shift bedtime later and seek bright evening light at your destination';
  return `${cityName(origin)} \u2192 ${cityName(dest)}: ~${Math.abs(diff).toFixed(1)}h ${eastward?'ahead':'behind'}. Allow ~${days} day(s) to adjust \u2014 ${advice}, avoid opposite-timed light.`;
}

// Moon phase from a known reference new moon, via the synodic month length (approximation, no API needed).
function moonPhase(date){
  const synodic = 29.530588853;
  const refNewMoon = Date.UTC(2000,0,6,18,14,0);
  const days = (date.getTime() - refNewMoon) / 86400000;
  let frac = (days % synodic) / synodic;
  if(frac < 0) frac += 1;
  const illum = Math.round((1 - Math.cos(2*Math.PI*frac)) / 2 * 100);
  const names = ['New Moon','Waxing Crescent','First Quarter','Waxing Gibbous','Full Moon','Waning Gibbous','Last Quarter','Waning Crescent'];
  const emojis = ['\u{1F311}','\u{1F312}','\u{1F313}','\u{1F314}','\u{1F315}','\u{1F316}','\u{1F317}','\u{1F318}'];
  const idx = Math.floor(frac * 8) % 8;
  return {name: names[idx], emoji: emojis[idx], illum};
}

// Approximate tide state: an idealized semi-diurnal (M2, ~12.42h) cycle, phase-shifted by longitude.
// This is a simplified simulation for flavor, NOT real tide-station data.
function tideState(city, date){
  const period = 12.42;
  const hours = date.getTime()/3600000 + city.lng/15;
  const pos = (hours % period) / period;
  const y = Math.sin(2*Math.PI*pos);
  const dy = Math.cos(2*Math.PI*pos);
  let label;
  if(y > 0.85) label = 'High';
  else if(y < -0.85) label = 'Low';
  else label = dy > 0 ? 'Rising' : 'Falling';
  return `\u{1F30A} ${label} tide (approx.)`;
}

function timeHTML(zone, t){
  const opts = {hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:use12h};
  if(!lowPower) opts.fractionalSecondDigits = 3;
  const parts = fmtDisplay(zone, opts).formatToParts(t);
  let html = '';
  parts.forEach((p, i) => {
    if(p.type === 'hour' || p.type === 'minute' || p.type === 'second'){ html += `<span class="d2">${p.value}</span>`; }
    else if(p.type === 'fractionalSecond'){ if(!lowPower) html += `${p.value}</span>`; }
    else if(p.type === 'literal' && parts[i+1] && parts[i+1].type === 'fractionalSecond'){ if(!lowPower) html += `<span class="ms">${p.value}`; }
    else if(p.type === 'dayPeriod'){ html += `<span class="ampm">${p.value.toUpperCase()}</span>`; }
    else { html += p.value; }
  });
  return html;
}

function distanceHTML(c){
  if(c.id === homeCityId) return '&#127968; Home base';
  const home = CITIES[homeCityId];
  const km = Math.round(haversineKm(home.lat, home.lng, c.lat, c.lng));
  return `${km.toLocaleString()} km &middot; ~${flightEstimate(km)} flight`;
}

function cardHTML(c){
  const isAnalog = analogSet.has(c.id);
  const isCoastal = COASTAL.has(c.city);
  return `<div class="card ${isAnalog?'analog':''}" data-zone="${c.zone}" data-id="${c.id}" draggable="${editMode}">
    <button class="remove" aria-label="Remove ${cityName(c)}" data-remove="${c.id}">&times;</button>
    <button class="analog-toggle" aria-pressed="${isAnalog}" title="Toggle analog view" data-analog="${c.id}">&#128336;</button>
    <button class="ambient-toggle" aria-pressed="false" title="Play ambient weather sound" data-ambient="${c.id}">&#128266;</button>
    <div class="place"><span class="flag">${c.flag}</span><span class="city">${cityName(c)}</span><span class="country">${c.country}</span></div>
    <div class="holiday" data-holiday hidden></div>
    <div class="time" data-time>--:--:--.---</div>
    <div class="analog-face" data-face>
      <div class="hand hour" data-hh></div>
      <div class="hand minute" data-mm></div>
      <div class="hand second" data-ss></div>
      <div class="center"></div>
    </div>
    <div class="sub"><span data-date>--</span><span class="badge" data-offset>UTC</span></div>
    <div class="distance">${distanceHTML(c)}</div>
    ${isCoastal ? '<div class="tide" data-tide>&#127754; --</div>' : ''}
    <div class="daybar"><div class="dot" data-dot style="left:50%"></div></div>
    <div class="daynight"><span data-icon>&#9728;</span><span data-label>Day</span></div>
  </div>`;
}

function renderGrid(){
  grid.innerHTML = active.map(cardHTML).join('');
  if(typeof currentAmbientId !== 'undefined' && currentAmbientId !== null){
    const btn = grid.querySelector(`[data-ambient="${currentAmbientId}"]`);
    if(btn) btn.setAttribute('aria-pressed','true');
  }
  updateHolidays();
}

// Free, keyless public-holiday lookup (Nager.Date). Coverage varies by country;
// cities without data simply show no banner.
const holidayCache = new Map();
async function fetchHolidays(cc){
  const year = new Date().getFullYear();
  const key = cc + year;
  if(holidayCache.has(key)) return holidayCache.get(key);
  const p = fetch(`https://date.nager.at/api/v3/PublicHolidays/${year}/${cc}`)
    .then(r => r.ok ? r.json() : [])
    .catch(() => []);
  holidayCache.set(key, p);
  return p;
}
async function updateHolidays(){
  const t = now();
  for(const c of active){
    const card = grid.querySelector(`.card[data-id="${c.id}"]`);
    const el = card && card.querySelector('[data-holiday]');
    if(!el) continue;
    const holidays = await fetchHolidays(c.cc);
    const parts = fmt(c.zone, {year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(t);
    const todayStr = `${parts.find(p=>p.type==='year').value}-${parts.find(p=>p.type==='month').value}-${parts.find(p=>p.type==='day').value}`;
    const match = (holidays || []).find(h => h.date === todayStr);
    if(match){ el.textContent = `\u{1F389} ${match.localName || match.name}`; el.hidden = false; }
    else { el.hidden = true; }
  }
}

function optionsByRegion(filterFn){
  const regions = [...new Set(CITIES.map(c => c.region))];
  return regions.map(r => {
    const items = CITIES.filter(c => c.region === r && (!filterFn || filterFn(c)));
    if(!items.length) return '';
    return `<optgroup label="${r}">${items.map(c => `<option value="${c.id}">${c.flag} ${cityName(c)}, ${c.country}</option>`).join('')}</optgroup>`;
  }).join('');
}

function renderSuggestions(){
  const q = citySearch.value.trim().toLowerCase();
  const avail = CITIES.filter(c => !active.some(a => a.id === c.id));
  const matches = q ? avail.filter(c => c.city.toLowerCase().includes(q) || cityName(c).toLowerCase().includes(q) || c.country.toLowerCase().includes(q)).slice(0,8) : [];
  acList.innerHTML = matches.map(c => `<div class="ac-item" data-id="${c.id}"><span>${c.flag}</span><span>${cityName(c)}</span><span class="muted">${c.country}</span></div>`).join('');
  acList.classList.toggle('show', matches.length > 0);
}
citySearch.addEventListener('input', renderSuggestions);
citySearch.addEventListener('focus', renderSuggestions);
document.addEventListener('click', e => { if(!e.target.closest('.autocomplete')) acList.classList.remove('show'); });
acList.addEventListener('click', e => {
  const item = e.target.closest('.ac-item'); if(!item) return;
  const city = CITIES[+item.dataset.id];
  if(city){ active.push(city); renderGrid(); tick(); saveState(); }
  citySearch.value = ''; acList.classList.remove('show');
});

function populateCompare(){
  const prevA = cmpA.value, prevB = cmpB.value;
  const opts = optionsByRegion();
  cmpA.innerHTML = opts; cmpB.innerHTML = opts;
  cmpA.value = prevA || CITIES.find(c => c.city === 'Kolkata').id;
  cmpB.value = prevB || CITIES.find(c => c.city === 'London').id;
}
function updateCompare(){
  if(!compareMode) return;
  const t = now();
  const cityA = CITIES[+cmpA.value], cityB = CITIES[+cmpB.value];
  if(!cityA || !cityB) return;
  const diff = offsetMinutes(cityA.zone,t) - offsetMinutes(cityB.zone,t);
  const abs = Math.abs(diff), h = Math.floor(abs/60), m = abs%60;
  const span = h ? `${h}h${m ? ' '+m+'m' : ''}` : `${m}m`;
  cmpResult.innerHTML = diff === 0
    ? `<strong>${cityName(cityA)}</strong> and <strong>${cityName(cityB)}</strong> are at the same time`
    : (() => { const [ahead,behind] = diff>0 ? [cityA,cityB] : [cityB,cityA]; return `<strong>${cityName(ahead)}</strong> is <strong>${span}</strong> ahead of <strong>${cityName(behind)}</strong>`; })();
  cmpOverlap.textContent = overlapText(cityA, cityB, t);
  cmpJetlag.textContent = jetlagTips(cityA, cityB, t);
}
cmpA.addEventListener('change', updateCompare);
cmpB.addEventListener('change', updateCompare);

function populateHome(){
  homeSelect.innerHTML = optionsByRegion();
  homeSelect.value = homeCityId;
}
homeSelect.addEventListener('change', () => { homeCityId = +homeSelect.value; renderGrid(); tick(); saveState(); });

function tick(){
  if(!running) return;
  const t = now();
  document.querySelectorAll('.card').forEach(card => {
    const zone = card.dataset.zone;
    const dateStr = fmtDisplay(zone, {weekday:'short',day:'2-digit',month:'short'}).format(t);
    let hour = parseInt(fmt(zone, {hour:'2-digit',hour12:false}).format(t), 10);
    let minute = parseInt(fmt(zone, {minute:'2-digit'}).format(t), 10);
    let second = parseInt(fmt(zone, {second:'2-digit'}).format(t), 10);
    if(isNaN(hour) || isNaN(minute) || isNaN(second)){
      // Locale-independent fallback if a formatter ever returns non-Latin digits
      const en = new Intl.DateTimeFormat('en-US', {timeZone:zone, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false, numberingSystem:'latn'}).formatToParts(t);
      hour = +en.find(p=>p.type==='hour').value; minute = +en.find(p=>p.type==='minute').value; second = +en.find(p=>p.type==='second').value;
    }
    const offParts = fmt(zone, {hour:'2-digit',timeZoneName:'shortOffset'}).formatToParts(t);
    const off = (offParts.find(p => p.type === 'timeZoneName') || {}).value || 'UTC';
    const b = band(hour);

    card.style.setProperty('--band', b.color);
    card.querySelector('[data-time]').innerHTML = timeHTML(zone, t);
    card.querySelector('[data-date]').textContent = dateStr;
    card.querySelector('[data-offset]').textContent = off;
    card.querySelector('[data-dot]').style.left = ((hour/24)*100) + '%';
    card.querySelector('[data-icon]').innerHTML = b.day ? '&#9728;' : '&#127769;';
    card.querySelector('[data-label]').textContent = b.name;

    if(card.classList.contains('analog')){
      const ms = t.getMilliseconds();
      const fracSecond = second + ms/1000;
      const hh = ((hour%12) + minute/60 + fracSecond/3600) * 30;
      const mm = (minute + fracSecond/60) * 6;
      const ss = fracSecond * 6;
      card.querySelector('[data-hh]').style.transform = `rotate(${hh}deg)`;
      card.querySelector('[data-mm]').style.transform = `rotate(${mm}deg)`;
      card.querySelector('[data-ss]').style.transform = `rotate(${ss}deg)`;
    }
    const tideEl = card.querySelector('[data-tide]');
    if(tideEl) tideEl.textContent = tideState(CITIES[+card.dataset.id], t);
  });
  const moon = moonPhase(t);
  moonBar.innerHTML = `${moon.emoji} ${moon.name} &middot; ${moon.illum}% illuminated`;
  updateCompare();
}

grid.addEventListener('click', e => {
  const removeId = e.target.dataset.remove;
  if(removeId !== undefined){ active = active.filter(c => c.id !== +removeId); renderGrid(); tick(); saveState(); return; }
  const analogBtn = e.target.closest('[data-analog]');
  if(analogBtn){ const id = +analogBtn.dataset.analog; analogSet.has(id) ? analogSet.delete(id) : analogSet.add(id); renderGrid(); tick(); return; }
  const ambientBtn = e.target.closest('[data-ambient]');
  if(ambientBtn) toggleAmbient(+ambientBtn.dataset.ambient);
});

// Ambient soundscape synthesized in-browser (no audio files) from the city's real
// current weather via the free, keyless Open-Meteo API.
let audioCtx = null, currentAmbient = null, currentAmbientId = null;
const weatherCache = new Map();
function weatherCategory(code){
  if(code === 0) return 'clear';
  if([1,2,3,45,48].includes(code)) return 'cloudy';
  if([51,53,55,56,57,61,63,65,66,67,80,81,82].includes(code)) return 'rain';
  if([71,73,75,77,85,86].includes(code)) return 'snow';
  if([95,96,99].includes(code)) return 'thunder';
  return 'clear';
}
async function fetchWeather(city){
  if(weatherCache.has(city.id)) return weatherCache.get(city.id);
  const p = fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lng}&current_weather=true`)
    .then(r => r.json()).then(d => weatherCategory(d.current_weather?.weathercode ?? 0)).catch(() => 'clear');
  weatherCache.set(city.id, p);
  return p;
}
function stopAmbient(){
  if(currentAmbient){ try{ currentAmbient.noise.stop(); }catch(e){} currentAmbient = null; }
  currentAmbientId = null;
  document.querySelectorAll('[data-ambient]').forEach(b => b.setAttribute('aria-pressed','false'));
}
function playAmbient(category){
  const ctx = audioCtx || (audioCtx = new (window.AudioContext || window.webkitAudioContext)());
  const bufferSize = 2 * ctx.sampleRate;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i=0;i<bufferSize;i++) data[i] = Math.random()*2-1;
  const noise = ctx.createBufferSource(); noise.buffer = buffer; noise.loop = true;
  const filter = ctx.createBiquadFilter();
  const gain = ctx.createGain();
  const cfg = {clear:['lowpass',2200,.05], cloudy:['bandpass',700,.1], rain:['highpass',1000,.16], snow:['lowpass',500,.07], thunder:['lowpass',350,.22]}[category] || ['lowpass',2000,.05];
  filter.type = cfg[0]; filter.frequency.value = cfg[1]; gain.gain.value = cfg[2];
  noise.connect(filter).connect(gain).connect(ctx.destination);
  noise.start();
  currentAmbient = {noise, gain, ctx};
}
async function toggleAmbient(id){
  const btn = document.querySelector(`[data-ambient="${id}"]`);
  if(currentAmbientId === id){ stopAmbient(); return; }
  stopAmbient();
  currentAmbientId = id;
  if(btn) btn.setAttribute('aria-pressed','true');
  const category = await fetchWeather(CITIES[id]);
  if(currentAmbientId !== id) return;
  playAmbient(category);
}

grid.addEventListener('dragstart', e => {
  const card = e.target.closest('.card');
  if(!card || !editMode) return;
  dragId = +card.dataset.id;
  card.classList.add('dragging');
});
grid.addEventListener('dragend', e => {
  const card = e.target.closest('.card');
  if(card) card.classList.remove('dragging');
  dragId = null;
  saveState();
});
grid.addEventListener('dragover', e => {
  if(dragId === null) return;
  e.preventDefault();
  const card = e.target.closest('.card');
  if(!card) return;
  const overId = +card.dataset.id;
  if(overId === dragId) return;
  const from = active.findIndex(c => c.id === dragId), to = active.findIndex(c => c.id === overId);
  if(from < 0 || to < 0 || from === to) return;
  const [item] = active.splice(from,1);
  active.splice(to,0,item);
  renderGrid(); tick();
});

document.querySelectorAll('[data-format-btn]').forEach(btn => {
  btn.addEventListener('click', () => {
    use12h = btn.dataset.formatBtn === '12';
    document.querySelectorAll('[data-format-btn]').forEach(b => b.setAttribute('aria-pressed', b === btn));
    tick();
  });
});

pauseToggle.addEventListener('click', () => {
  running = !running;
  pauseToggle.setAttribute('aria-pressed', !running);
  pauseIcon.innerHTML = running ? '&#9208;' : '&#9654;';
  pauseLabel.textContent = running ? 'Pause' : 'Resume';
  if(running) tick();
});

editToggle.addEventListener('click', () => {
  editMode = !editMode;
  app.classList.toggle('editing', editMode);
  editToggle.setAttribute('aria-pressed', editMode);
  editLabel.textContent = editMode ? 'Done editing' : 'Add / remove / reorder';
  renderGrid(); tick();
});

compareToggle.addEventListener('click', () => {
  compareMode = !compareMode;
  app.classList.toggle('comparing', compareMode);
  compareToggle.setAttribute('aria-pressed', compareMode);
  compareLabel.textContent = compareMode ? 'Hide comparison' : 'Compare cities';
  if(compareMode) updateCompare();
});

document.querySelectorAll('[data-theme-btn]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.documentElement.setAttribute('data-theme', btn.dataset.themeBtn);
    document.querySelectorAll('[data-theme-btn]').forEach(b => b.setAttribute('aria-pressed', b === btn));
  });
});

// Multi-language UI (also drives date/weekday locale via fmt())
function applyLanguage(){
  const t = I18N[uiLang] || I18N.en;
  app.classList.toggle('wide-digits', NATIVE_DIGIT_LANGS.has(uiLang));
  document.getElementById('liveLabel').textContent = t.live;
  document.getElementById('appTitle').textContent = t.title;
  pauseLabel.textContent = running ? t.pause : t.resume;
  compareLabel.textContent = compareMode ? t.hideCompare : t.compare;
  editLabel.textContent = editMode ? t.done : t.edit;
  document.querySelector('.home-bar span').textContent = '\u{1F4CD} ' + t.home;
  citySearch.placeholder = t.search;
  lowPowerLabel.textContent = t.lowpower;
  exportBtn.textContent = t.exportBtn;
  deleteBtn.textContent = t.deleteBtn;
  document.getElementById('rightsLabel').textContent = t.rights;
  renderGrid();
  populateCompare();
  populateHome();
  tick();
}
langSelect.addEventListener('change', () => { uiLang = langSelect.value; applyLanguage(); saveState(); });

// Adjustable text size. The readout updates live during drag (cheap text change,
// no layout shift); the actual page-wide font-size only applies on release, so the
// slider itself never resizes out from under a mobile touch mid-drag.
const fontSizeReadout = document.getElementById('fontSizeReadout');
fontSizeInput.addEventListener('input', () => {
  fontSizeReadout.textContent = fontSizeInput.value + '%';
});
function commitFontSize(){
  fontScale = +fontSizeInput.value;
  fontSizeReadout.textContent = fontScale + '%';
  document.documentElement.style.fontSize = fontScale + '%';
  saveState();
}
fontSizeInput.addEventListener('change', commitFontSize);
fontSizeInput.addEventListener('touchend', commitFontSize);

// Battery-aware low-power mode (manual toggle always available; auto only where the
// Battery Status API is supported \u2014 it's been removed from most browsers except some Chrome builds).
function setTickRate(ms){
  if(tickTimer) clearInterval(tickTimer);
  tickTimer = setInterval(tick, ms);
}
function applyLowPower(on){
  lowPower = on;
  app.classList.toggle('low-power', on);
  lowPowerToggle.setAttribute('aria-pressed', on);
  setTickRate(on ? 1000 : 40);
  tick();
}
let lowPowerUserSet = false;
lowPowerToggle.addEventListener('click', () => { lowPowerUserSet = true; applyLowPower(!lowPower); });
if('getBattery' in navigator){
  navigator.getBattery().then(battery => {
    function checkBattery(){
      if(lowPowerUserSet) return;
      applyLowPower(battery.level < 0.2 && !battery.charging);
    }
    battery.addEventListener('levelchange', checkBattery);
    battery.addEventListener('chargingchange', checkBattery);
    checkBattery();
  }).catch(() => {});
}

// One-tap export / delete of this browser's saved data
exportBtn.addEventListener('click', () => {
  const data = {ids: active.map(c => c.id), home: homeCityId, lang: uiLang, fontScale};
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'globus-data.json';
  a.click();
  URL.revokeObjectURL(a.href);
});
deleteBtn.addEventListener('click', async () => {
  if(!confirm('Delete your saved cities, home base, and preferences from this browser? This cannot be undone.')) return;
  if(window.storage){ try{ await window.storage.delete(STORAGE_KEY); }catch(e){} }
  active = CITIES.filter(c => DEFAULT_ACTIVE.includes(c.city));
  homeCityId = (CITIES.find(c => c.zone === deviceZone) || CITIES.find(c => c.city === 'Kolkata')).id;
  renderGrid(); populateHome(); tick();
});

const STORAGE_KEY = 'world-clock-state-v2';
async function saveState(){
  if(!window.storage) return;
  try{ await window.storage.set(STORAGE_KEY, JSON.stringify({ids: active.map(c => c.id), home: homeCityId, lang: uiLang, fontScale})); }
  catch(e){ /* persistence unavailable here — app still works from memory */ }
}
async function loadState(){
  if(!window.storage) return;
  try{
    const res = await window.storage.get(STORAGE_KEY);
    if(res && res.value){
      const data = JSON.parse(res.value);
      if(Array.isArray(data.ids)){ const restored = data.ids.map(id => CITIES[id]).filter(Boolean); if(restored.length) active = restored; }
      if(typeof data.home === 'number' && CITIES[data.home]) homeCityId = data.home;
      if(typeof data.lang === 'string' && I18N[data.lang]) uiLang = data.lang;
      if(typeof data.fontScale === 'number') fontScale = data.fontScale;
    }
  }catch(e){ /* no saved state yet — keep defaults */ }
}

async function init(){
  await loadState();
  langSelect.value = uiLang;
  fontSizeInput.value = fontScale;
  fontSizeReadout.textContent = fontScale + '%';
  document.documentElement.style.fontSize = fontScale + '%';
  applyLanguage();
  setTickRate(40);
}
init();

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
